openapi: 3.0.0

info:
  title: Code Vimarsh API
  description: Backend API documentation for Code Vimarsh
  version: 1.0.0

servers:
  - url: http://localhost:5000/api/v1

tags:
  - name: Projects
    description: Project showcase APIs

paths:

  /projects:
    post:
      tags:
        - Projects
      summary: Create a new project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                short_description:
                  type: string
                category:
                  type: string
                  example: Web
                about:
                  type: string
                key_features:
                  type: array
                  items:
                    type: string
                tech_stack:
                  type: array
                  items:
                    type: string
                github_link:
                  type: string
                image:
                  type: string
                author_name:
                  type: string
                members:
                  type: array
                  items:
                    type: string

      responses:
        201:
          description: Project created successfully
   
    get:
      tags:
        - Projects
      summary: Get all projects
      responses:
        200:
          description: List of projects returned

  /projects/{id}:
    get:
      tags:
        - Projects
      summary: Get project by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Project details returned

    put:
      tags:
        - Projects
      summary: Update project
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                short_description:
                  type: string
                category:
                  type: string
                about:
                  type: string
                key_features:
                  type: array
                  items:
                    type: string
                tech_stack:
                  type: array
                  items:
                    type: string
                github_link:
                  type: string
                image:
                  type: string
                author_name:
                  type: string
                members:
                  type: array
                  items:
                    type: string

      responses:
        200:
          description: Project updated successfully

    delete:
      tags:
        - Projects
      summary: Delete project
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Project deleted successfully

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT